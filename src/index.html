<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
    <title>Todo List</title>
</head>
<body>
    <header>
        <div class="site-icon">Todoit</div>
    </header>
    <main>
        <div class="side-bar">
            <div class="project-head">
               <button id="project-toggle"><i class="bx bx-chevron-down"></i></button> 
               <p> Projects</p>
               <button id="add-project"><i class="bx bx-plus"></i></button>
            </div>
            <div class="projects">
            </div>
        </div>

        <div class="main-container">
            <div class="top-nav">
                <button id="add-todo"><i class="bx bx-plus"></i>Add new Todo</button>
                <h1 id="project-title">Default Project</h1>
                
                <div class="right-icons">
                    <label for="project-status">Status:</label>
                    <select name="project-status" id="project-status">
                        <option value="Ongoing">Ongoing</option>
                        <option value="Completed">Completed</option>
                    </select>
                    <button id="delete-project">Delete Project</button>
                    <button><i class="bx bx-bell"></i></button>
                    <button><i class="bx bx-user"></i></button> 
                </div>
            </div>
            <div class="todo-container">
                 <div class="todo-wrapper">
                    <div></div>
                    <div>Active Tasks</div>
                    <div>Status</div>
                    <div>Priority</div>
                    <div>Due Date</div>
                    <div></div>
                 </div>
            </div>
        </div>
        
    </main>
    <footer>
        <div>Copyright <i class="bx bx-copyright"></i>  SuwillWD <a href="https://github.com/SuwillWD/todo-list"><i class="bxl bx-github"></i></a></div>
    </footer>

    <dialog id="add-todo-box">
        <form>
            <div class="main-inputs">
                <h2>Enter Todo Details</h2>
                <label for="title">
                    Title:
                    <input type="text" id="title" name="title" placeholder="Todo Title">
                </label>
                <label for="description">
                    Description:
                    <input type="text" id="description" name="description" placeholder="A small Description">
                </label>
                <label for="due-date">
                    Due Date:
                    <input type="date" id="due-date" name="due-date">
                </label>
                <label for="priority">
                    Priority:
                    <select id="priority" name="priority">
                        <option selected>Low</option>
                        <option>Medium</option>
                        <option>High</option>
                    </select>
                </label>
                <label for="notes">
                    Notes:
                    <Textarea id="notes" name="notes"></Textarea>
                </label>
            </div>
            <div>
            <div class="bottom-buttons">
                <button value="cancel" formmethod="dialog">Cancel</button>
                <button id="confirm" value="default">Confirm</button>
            </div>
            </div>
        </form>
    </dialog>

    <dialog id="todo-details">
        <div class="todo-heading">Todo Details</div>
        <div class="todo-labels">
            <h4>Title</h4>
            <h4>Description</h4>
            <h4>Due Date</h4>
            <h4>Priority</h4>
            <h4>Status</h4>
            <h4>Nots</h4>
            <h4>Project</h4>
        </div>
        <div class="todo-info"></div>
        <div class="todo-buttons">
            <button id="close-btn">Close</button>
            <button id="edit-btn">Edit</button>
        </div>
    </dialog>

</body>
</html>
